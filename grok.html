<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architecting the Autonomous Enterprise</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            overflow-x: hidden;
        }
        
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }
        
        .nav {
            display: flex;
            gap: 2rem;
        }
        
        .nav a {
            color: #cbd5e1;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }
        
        .nav a:hover {
            color: #60a5fa;
        }
        
        .slides-container {
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            height: 100vh;
            scroll-behavior: smooth;
        }
        
        .slide {
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            scroll-snap-align: start;
            background: #0f172a;
        }
        
        .slide-content {
            max-width: 1376px;
            max-height: 768px;
            width: 100%;
            height: 100%;
            position: relative;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.5);
            overflow: hidden;
        }
        
        .slide-content img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #1e2937;
        }
        
        .slide-number {
            position: absolute;
            bottom: 30px;
            right: 40px;
            background: rgba(15, 23, 42, 0.85);
            color: white;
            padding: 8px 18px;
            border-radius: 9999px;
            font-size: 0.9rem;
            font-weight: 600;
            backdrop-filter: blur(4px);
        }
        
        .controls {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.9);
            padding: 12px 24px;
            border-radius: 9999px;
            display: flex;
            gap: 16px;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
        }
        
        button {
            background: #1e2937;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 9999px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        button:hover {
            background: #3b82f6;
            transform: translateY(-2px);
        }
        
        .progress {
            height: 4px;
            background: #334155;
            position: fixed;
            bottom: 0;
            left: 0;
            transition: width 0.3s;
        }
        
        .title-slide {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
        }
        
        footer {
            text-align: center;
            padding: 2rem;
            color: #64748b;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <header class="header">
        <div style="font-weight: 700; font-size: 1.3rem; display: flex; align-items: center; gap: 12px;">
            <span style="color: #60a5fa;">⚡</span>
            Autonomous Enterprise
        </div>
        <nav class="nav">
            <a href="#slide1">Overview</a>
            <a href="#slide2">Vision</a>
            <a href="#slide3">Architecture</a>
            <a href="#slide15">Conclusion</a>
        </nav>
    </header>

    <div class="slides-container" id="slides">
        <!-- Slide 1 -->
        <section id="slide1" class="slide title-slide">
            <div class="slide-content">
                <img src="image1.png" alt="Slide 1 - Title">
            </div>
            <div class="slide-number">1 / 15</div>
        </section>

        <!-- Slide 2 -->
        <section id="slide2" class="slide">
            <div class="slide-content">
                <img src="image2.png" alt="Slide 2">
            </div>
            <div class="slide-number">2 / 15</div>
        </section>

        <!-- Slide 3 -->
        <section id="slide3" class="slide">
            <div class="slide-content">
                <img src="image3.png" alt="Slide 3">
            </div>
            <div class="slide-number">3 / 15</div>
        </section>

        <!-- Continue for all slides -->
        <section id="slide4" class="slide">
            <div class="slide-content">
                <img src="image4.png" alt="Slide 4">
            </div>
            <div class="slide-number">4 / 15</div>
        </section>

        <section id="slide5" class="slide">
            <div class="slide-content">
                <img src="image5.png" alt="Slide 5">
            </div>
            <div class="slide-number">5 / 15</div>
        </section>

        <section id="slide6" class="slide">
            <div class="slide-content">
                <img src="image6.png" alt="Slide 6">
            </div>
            <div class="slide-number">6 / 15</div>
        </section>

        <section id="slide7" class="slide">
            <div class="slide-content">
                <img src="image7.png" alt="Slide 7">
            </div>
            <div class="slide-number">7 / 15</div>
        </section>

        <section id="slide8" class="slide">
            <div class="slide-content">
                <img src="image8.png" alt="Slide 8">
            </div>
            <div class="slide-number">8 / 15</div>
        </section>

        <section id="slide9" class="slide">
            <div class="slide-content">
                <img src="image9.png" alt="Slide 9">
            </div>
            <div class="slide-number">9 / 15</div>
        </section>

        <section id="slide10" class="slide">
            <div class="slide-content">
                <img src="image10.png" alt="Slide 10">
            </div>
            <div class="slide-number">10 / 15</div>
        </section>

        <section id="slide11" class="slide">
            <div class="slide-content">
                <img src="image11.png" alt="Slide 11">
            </div>
            <div class="slide-number">11 / 15</div>
        </section>

        <section id="slide12" class="slide">
            <div class="slide-content">
                <img src="image12.png" alt="Slide 12">
            </div>
            <div class="slide-number">12 / 15</div>
        </section>

        <section id="slide13" class="slide">
            <div class="slide-content">
                <img src="image13.png" alt="Slide 13">
            </div>
            <div class="slide-number">13 / 15</div>
        </section>

        <section id="slide14" class="slide">
            <div class="slide-content">
                <img src="image14.png" alt="Slide 14">
            </div>
            <div class="slide-number">14 / 15</div>
        </section>

        <section id="slide15" class="slide">
            <div class="slide-content">
                <img src="image15.png" alt="Slide 15 - Final">
            </div>
            <div class="slide-number">15 / 15</div>
        </section>
    </div>

    <div class="controls">
        <button onclick="prevSlide()">← Previous</button>
        <span id="current-slide" style="font-weight: 600; min-width: 80px; text-align: center;">1 / 15</span>
        <button onclick="nextSlide()">Next →</button>
        <button onclick="toggleFullscreen()">⛶ Fullscreen</button>
    </div>

    <div class="progress" id="progress"></div>

    <footer>
        Architecting the Autonomous Enterprise • Interactive Presentation
    </footer>

    <script>
        let currentSlide = 1;
        const totalSlides = 15;
        const slidesContainer = document.getElementById('slides');
        
        function updateProgress() {
            const progress = document.getElementById('progress');
            const percentage = ((currentSlide - 1) / (totalSlides - 1)) * 100;
            progress.style.width = `${percentage}%`;
            document.getElementById('current-slide').textContent = `${currentSlide} / ${totalSlides}`;
        }
        
        function goToSlide(n) {
            currentSlide = Math.max(1, Math.min(n, totalSlides));
            const slideElement = document.getElementById(`slide${currentSlide}`);
            if (slideElement) {
                slideElement.scrollIntoView({ behavior: 'smooth' });
            }
            updateProgress();
        }
        
        function nextSlide() {
            if (currentSlide < totalSlides) {
                goToSlide(currentSlide + 1);
            }
        }
        
        function prevSlide() {
            if (currentSlide > 1) {
                goToSlide(currentSlide - 1);
            }
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                nextSlide();
            } else if (e.key === 'ArrowLeft') {
                prevSlide();
            } else if (e.key === 'f' || e.key === 'F') {
                toggleFullscreen();
            }
        });
        
        // Scroll tracking
        slidesContainer.addEventListener('scroll', () => {
            const scrollPosition = slidesContainer.scrollTop;
            const slideHeight = window.innerHeight;
            const newSlide = Math.floor(scrollPosition / slideHeight) + 1;
            
            if (newSlide !== currentSlide && newSlide >= 1 && newSlide <= totalSlides) {
                currentSlide = newSlide;
                updateProgress();
            }
        });
        
        // Initialize
        window.onload = function() {
            updateProgress();
            
            // Make images sharper on high DPI
            const images = document.querySelectorAll('.slide-content img');
            images.forEach(img => {
                img.style.imageRendering = 'crisp-edges';
            });
        };
    </script>
</body>
</html>
